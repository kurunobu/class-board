<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学級連絡ダッシュボード 2026-2027（前日コピー機能付）</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
/* 1. 基本設定（1280x720固定） */
:root {
  --sky-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
  --ocean-blue: #0284c7;
  --slate-dark: #0f172a;
  --glass-white: rgba(255, 255, 255, 0.96);
  --footer-bg: rgba(255, 255, 255, 0.9);
}

* { box-sizing: border-box; user-select: none; }

body {
  margin: 0; padding: 0;
  background-color: #cbd5e1;
  display: flex; justify-content: center; align-items: center;
  height: 100vh;
  font-family: 'Noto Sans JP', sans-serif;
  overflow: hidden;
}

.slide-container {
  width: 1280px; height: 720px;
  background: var(--sky-gradient);
  position: relative;
  box-shadow: 0 40px 100px rgba(0, 0, 0, 0.35);
  display: flex; flex-direction: column;
  overflow: hidden;
  border-radius: 20px;
}

/* 背景装飾 */
.bg-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-image: radial-gradient(circle at 2px 2px, rgba(2, 132, 199, 0.08) 1.5px, transparent 0);
  background-size: 35px 35px;
  z-index: 0;
}

/* 2. メインコンテンツエリア */
.dashboard-main {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 30px; 
  padding: 30px 40px 15px 40px;
  flex: 1;
  overflow: hidden;
}

.col-left, .col-right {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* カードデザイン */
.card {
  background: var(--glass-white);
  border-radius: 28px; padding: 25px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.8);
  display: flex; flex-direction: column;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 3px solid #e0f2fe;
  padding-bottom: 10px;
  margin-bottom: 15px;
}

.card-title {
  font-size: 26px; font-weight: 700; color: var(--ocean-blue);
  margin: 0; display: flex; align-items: center; gap: 12px;
}

/* コピーボタンのスタイル */
.btn-copy {
  background: #f1f5f9;
  color: var(--ocean-blue);
  border: 1px solid #cbd5e1;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
  font-family: 'Poppins', sans-serif;
}
.btn-copy:hover { background: var(--sky-gradient); border-color: var(--ocean-blue); }

/* 日付と時計 */
.date-display {
  font-size: 44px; font-weight: 700; color: var(--slate-dark);
  text-align: center; margin-bottom: 10px;
}

.clock-display {
  font-family: 'Poppins', sans-serif;
  font-size: 130px;
  font-weight: 700; color: var(--ocean-blue);
  line-height: 0.85; text-align: center;
  margin: 5px 0; letter-spacing: -3px;
}
.clock-display span { font-size: 50px; color: #94a3b8; margin-left: 8px; font-weight: 400; }

/* 編集エリア */
.editable {
  font-size: 26px; line-height: 1.8; color: var(--slate-dark);
  flex: 1; outline: none; padding: 10px;
  border-radius: 12px; transition: background 0.3s;
  overflow-y: auto;
}

.editing .editable {
  background: rgba(2, 132, 199, 0.08);
  border: 2px dashed var(--ocean-blue);
  user-select: text;
}

/* 3. フッターコントロールバー */
.footer-bar {
  position: relative;
  z-index: 10;
  height: 100px;
  background: var(--footer-bg);
  backdrop-filter: blur(15px);
  border-top: 1px solid rgba(0, 0, 0, 0.1);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 40px;
}

.f-group { display: flex; align-items: center; gap: 12px; }
.f-group.center { justify-content: center; }
.f-group.right { justify-content: flex-end; }

.pill {
  background: white; padding: 8px 20px; border-radius: 50px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.06);
  display: flex; align-items: center; gap: 12px; border: 1px solid #e2e8f0;
}

button {
  border: none; padding: 12px 24px; border-radius: 40px;
  font-weight: 700; font-size: 15px; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: all 0.2s;
}
button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
button:active { transform: scale(0.96); }

.btn-file { background: var(--slate-dark); color: white; font-size: 12px; }
.btn-nav { background: transparent; color: var(--ocean-blue); font-size: 26px; padding: 5px 15px; }
.btn-edit { background: #f59e0b; color: white; }
.btn-save { background: #10b981; color: white; display: none; }

input[type="date"] {
  border: none; background: transparent; font-family: inherit;
  font-size: 18px; color: var(--ocean-blue); font-weight: 700; outline: none;
}

/* リスト表示 */
ul { margin: 0; padding-left: 45px; }
li { margin-bottom: 18px; }
li strong { color: var(--ocean-blue); }

#file-input { display: none; }
    </style>
</head>
<body>

<div class="slide-container" id="main-ui">
    <div class="bg-overlay"></div>
    
    <div class="dashboard-main">
        <div class="col-left">
            <div class="card" style="padding: 20px;">
                <div class="date-display" id="date-text">2026年4月1日 (水)</div>
                <div class="clock-display" id="clock">00:00<span>00</span></div>
            </div>

            <div class="card" style="flex: 1; justify-content: flex-start;">
                <div class="card-header">
                    <h2 class="card-title"><i class="fa-solid fa-clipboard-check"></i>提出物・締め切り</h2>
                    <button class="btn-copy" onclick="copyFromPrev('dead')">copy</button>
                </div>
                <div id="e-deadline" class="editable" contenteditable="false">
                    <ul>
                        <li>（提出物を入力）</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="col-right">
            <div class="card" style="height: 100%; justify-content: flex-start;">
                <div class="card-header">
                    <h2 class="card-title"><i class="fa-solid fa-list-ul"></i>今日の予定</h2>
                    <button class="btn-copy" onclick="copyFromPrev('plan')">copy</button>
                </div>
                <div id="e-plan" class="editable" contenteditable="false">
                    <ul>
                        <li>（今日の予定を入力）</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-bar">
        <div class="f-group">
            <button class="btn-file" onclick="exportData()"><i class="fa-solid fa-download"></i> ファイル保存</button>
            <button class="btn-file" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-upload"></i> 読み込み</button>
            <input type="file" id="file-input" accept=".json" onchange="importData(event)">
        </div>

        <div class="f-group center">
            <div class="pill">
                <i class="fa-solid fa-calendar-day" style="color: var(--ocean-blue);"></i>
                <input type="date" id="date-picker" min="2026-04-01" max="2027-03-31">
            </div>
            <div class="pill" style="padding: 2px 10px;">
                <button class="btn-nav" onclick="moveDate(-1)">◀</button>
                <button class="btn-nav" onclick="moveDate(1)">▶</button>
            </div>
        </div>

        <div class="f-group right">
            <button id="edit-btn" class="btn-edit" onclick="toggleEdit()"><i class="fa-solid fa-pen"></i> 編集モード</button>
            <button id="save-btn" class="btn-save" onclick="saveToMemory()"><i class="fa-solid fa-check"></i> 完了して保存</button>
        </div>
    </div>
</div>

<script>
    let MASTER_DATA = {}; 
    let activeDate = new Date();
    const endLimit = new Date('2027-03-31');
    const startLimit = new Date('2026-04-01');
    let isEditing = false;

    // 時計
    function updateClock() {
        try {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerHTML = `${h}:${m}<span>${s}</span>`;
        } catch(e) {}
    }
    setInterval(updateClock, 1000);
    updateClock();

    function getDateKey(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function render() {
        const days = ['日','月','火','水','木','金','土'];
        document.getElementById('date-text').innerText = `${activeDate.getFullYear()}年${activeDate.getMonth()+1}月${activeDate.getDate()}日 (${days[activeDate.getDay()]})`;
        
        const key = getDateKey(activeDate);
        document.getElementById('date-input').value = key;
        
        const dead = document.getElementById('e-deadline');
        const plan = document.getElementById('e-plan');
        
        if (MASTER_DATA[key]) {
            dead.innerHTML = MASTER_DATA[key].dead || '<ul><li>-</li></ul>';
            plan.innerHTML = MASTER_DATA[key].plan || '<ul><li>-</li></ul>';
        } else {
            dead.innerHTML = '<ul><li>（提出物を入力）</li></ul>';
            plan.innerHTML = '<ul><li>（予定を入力）</li></ul>';
        }
    }

    function moveDate(n) {
        activeDate.setDate(activeDate.getDate() + n);
        render();
    }

    // --- 新機能：前日コピーロジック ---
    function copyFromPrev(type) {
        // 前日の日付を計算
        const prevDate = new Date(activeDate);
        prevDate.setDate(activeDate.getDate() - 1);
        const prevKey = getDateKey(prevDate);

        if (MASTER_DATA[prevKey] && MASTER_DATA[prevKey][type]) {
            const targetArea = document.getElementById(type === 'dead' ? 'e-deadline' : 'e-plan');
            targetArea.innerHTML = MASTER_DATA[prevKey][type];
            
            // ボタンの見た目で成功を通知
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = 'Copied!';
            btn.style.background = '#d1fae5';
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = '#f1f5f9';
            }, 1000);
        } else {
            alert("前日のデータが見つかりません。");
        }
    }

    function toggleEdit() {
        isEditing = !isEditing;
        const ui = document.getElementById('main-ui');
        const eb = document.getElementById('edit-btn');
        const sb = document.getElementById('save-btn');
        const targets = [document.getElementById('e-deadline'), document.getElementById('e-plan')];

        if (isEditing) {
            ui.classList.add('editing');
            eb.innerHTML = '<i class="fa-solid fa-undo"></i> キャンセル';
            sb.style.display = 'flex';
            targets.forEach(t => t.setAttribute('contenteditable', 'true'));
        } else {
            ui.classList.remove('editing');
            eb.innerHTML = '<i class="fa-solid fa-pen"></i> 編集モード';
            sb.style.display = 'none';
            targets.forEach(t => t.setAttribute('contenteditable', 'false'));
            render();
        }
    }

    function saveToMemory() {
        const key = getDateKey(activeDate);
        MASTER_DATA[key] = {
            dead: document.getElementById('e-deadline').innerHTML,
            plan: document.getElementById('edit-plan').innerHTML
        };
        try { localStorage.setItem('classroom_v11_cache', JSON.stringify(MASTER_DATA)); } catch(e){}
        const sb = document.getElementById('save-btn');
        sb.innerHTML = '<i class="fa-solid fa-circle-check"></i> 完了';
        setTimeout(() => { sb.innerHTML = '<i class="fa-solid fa-check"></i> 完了して保存'; toggleEdit(); }, 500);
    }

    function exportData() {
        const json = JSON.stringify(MASTER_DATA, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `学級予定データ.json`;
        a.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try { MASTER_DATA = JSON.parse(e.target.result); render(); alert("データを読み込みました。"); } catch(err) { alert("正しいファイルを選んでください。"); }
        };
        reader.readAsText(file);
    }

    document.getElementById('date-picker').addEventListener('change', (e) => {
        const d = new Date(e.target.value);
        if (!isNaN(d)) { activeDate = d; render(); }
    });

    window.onload = () => {
        try {
            const cached = localStorage.getItem('classroom_v11_cache');
            if(cached) MASTER_DATA = JSON.parse(cached);
        } catch(e){}
        const today = new Date();
        activeDate = (today >= startLimit && today <= endLimit) ? today : startLimit;
        render();
    };
</script>
</body>
</html>
