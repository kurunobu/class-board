<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学級連絡ダッシュボード 2026-2027 | 確定版v12</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
/* 1. デザイン設定 (1280x720 固定) */
:root {
  --sky-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
  --ocean-blue: #0284c7;
  --slate-dark: #0f172a;
  --glass-white: rgba(255, 255, 255, 0.96);
  --footer-bg: rgba(255, 255, 255, 0.94);
}

* { box-sizing: border-box; user-select: none; }

body {
  margin: 0; padding: 0;
  background-color: #cbd5e1;
  display: flex; justify-content: center; align-items: center;
  height: 100vh;
  font-family: 'Noto Sans JP', sans-serif;
  overflow: hidden;
}

.slide-container {
  width: 1280px; height: 720px;
  background: var(--sky-gradient);
  position: relative;
  box-shadow: 0 40px 100px rgba(0, 0, 0, 0.3);
  display: flex; flex-direction: column;
  overflow: hidden;
  border-radius: 20px;
}

/* 背景装飾 */
.bg-dots {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-image: radial-gradient(circle at 2px 2px, rgba(2, 132, 199, 0.08) 1.5px, transparent 0);
  background-size: 35px 35px;
  z-index: 0;
}

/* 3. コンテンツエリア */
.dashboard-main {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 30px; padding: 30px 40px 10px 40px;
  flex: 1; overflow: hidden;
}

.col-left, .col-right { display: flex; flex-direction: column; gap: 20px; }

.card {
  background: var(--glass-white);
  border-radius: 30px; padding: 25px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.8);
  display: flex; flex-direction: column;
  position: relative;
}

.card-header {
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 3px solid #e0f2fe; padding-bottom: 12px; margin-bottom: 15px;
}

.card-title {
  font-size: 26px; font-weight: 700; color: var(--ocean-blue); margin: 0;
  display: flex; align-items: center; gap: 10px;
}

/* 4. 時計と日付 */
.date-display { font-size: 44px; font-weight: 700; color: var(--slate-dark); text-align: center; margin-bottom: 5px; }

.clock-display {
  font-family: 'Poppins', sans-serif;
  font-size: 135px; font-weight: 700; color: var(--ocean-blue);
  line-height: 0.85; text-align: center; margin: 0; letter-spacing: -3px;
}
.clock-display span { font-size: 55px; color: #94a3b8; margin-left: 8px; font-weight: 400; }

/* 5. 編集エリア */
.editable {
  font-size: 26px; line-height: 1.8; color: var(--slate-dark);
  flex: 1; outline: none; padding: 10px; border-radius: 12px;
  overflow-y: auto;
}

.editing .editable {
  background: rgba(2, 132, 199, 0.06);
  border: 2.5px dashed var(--ocean-blue);
  user-select: text;
}

/* copyボタン（編集モード中のみ） */
.btn-copy {
  display: none; background: #f1f5f9; color: var(--ocean-blue);
  border: 2px solid var(--ocean-blue); padding: 5px 15px;
  border-radius: 50px; font-weight: 700; cursor: pointer;
  font-family: 'Poppins', sans-serif; font-size: 14px;
}
.editing .btn-copy { display: block; }
.btn-copy:hover { background: var(--ocean-blue); color: white; }

/* 6. フッターバー (最下部) */
.footer-bar {
  position: relative; z-index: 10; height: 100px;
  background: var(--footer-bg); backdrop-filter: blur(15px);
  border-top: 1px solid rgba(0, 0, 0, 0.1);
  display: grid; grid-template-columns: 1.2fr 1fr 1.2fr;
  align-items: center; padding: 0 40px;
}

.f-group { display: flex; align-items: center; gap: 12px; }
.f-group.center { justify-content: center; }
.f-group.right { justify-content: flex-end; }

.pill {
  background: white; padding: 8px 18px; border-radius: 50px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.06);
  display: flex; align-items: center; gap: 10px; border: 1px solid #e2e8f0;
}

button {
  border: none; padding: 12px 24px; border-radius: 40px;
  font-weight: 700; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; gap: 8px; transition: 0.2s;
}

.btn-file { background: var(--slate-dark); color: white; font-size: 11px; }
.btn-nav { background: transparent; color: var(--ocean-blue); font-size: 24px; padding: 5px 12px; }
.btn-edit { background: #f59e0b; color: white; }
.btn-save { background: #10b981; color: white; display: none; }

input[type="date"] {
  border: none; background: transparent; font-family: inherit;
  font-size: 18px; color: var(--ocean-blue); font-weight: 700; outline: none;
}

ul { margin: 0; padding-left: 45px; }
li { margin-bottom: 15px; }
li strong { color: var(--ocean-blue); }

#file-input { display: none; }
    </style>
</head>
<body>

<div class="slide-container" id="main-ui">
    <div class="bg-dots"></div>
    
    <div class="dashboard-main">
        <div class="col-left">
            <div class="card" style="padding: 20px;">
                <div class="date-display" id="date-text">----年--月--日 (-)</div>
                <div class="clock-display" id="clock">00:00<span>00</span></div>
            </div>

            <div class="card" style="flex: 1; justify-content: flex-start;">
                <div class="card-header">
                    <h2 class="card-title"><i class="fa-solid fa-clipboard-check"></i>提出物・締め切り</h2>
                    <button class="btn-copy" onclick="copyFromPrevious('dead')">copy from prev</button>
                </div>
                <div id="e-deadline" class="editable" contenteditable="false">
                    <ul><li>（編集ボタンを押して入力）</li></ul>
                </div>
            </div>
        </div>

        <div class="col-right">
            <div class="card" style="height: 100%; justify-content: flex-start;">
                <div class="card-header">
                    <h2 class="card-title"><i class="fa-solid fa-calendar-day"></i>今日の予定</h2>
                    <button class="btn-copy" onclick="copyFromPrevious('plan')">copy from prev</button>
                </div>
                <div id="e-plan" class="editable" contenteditable="false">
                    <ul><li>（ここに1日の予定を入力）</li></ul>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-bar">
        <div class="f-group">
            <button class="btn-file" onclick="exportData()"><i class="fa-solid fa-download"></i> ファイル保存</button>
            <button class="btn-file" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-upload"></i> 読込(復元)</button>
            <input type="file" id="file-input" accept=".json" onchange="importData(event)">
        </div>

        <div class="f-group center">
            <div class="pill">
                <input type="date" id="date-picker" min="2026-04-01" max="2027-03-31">
            </div>
            <div class="pill" style="padding: 2px 10px;">
                <button class="btn-nav" onclick="moveDate(-1)">◀</button>
                <button class="btn-nav" onclick="moveDate(1)">▶</button>
            </div>
        </div>

        <div class="f-group right">
            <button id="edit-btn" class="btn-edit" onclick="toggleEdit()"><i class="fa-solid fa-pen"></i> 編集モード</button>
            <button id="save-btn" class="btn-save" onclick="saveToMemory()"><i class="fa-solid fa-check"></i> 完了して保存</button>
        </div>
    </div>
</div>

<script>
    // --- 内部データ管理 ---
    const STORAGE_KEY = 'classroom_v12_final';
    let MASTER_DATA = {}; 
    let activeDate = new Date();
    const endLimit = new Date('2027-03-31');
    const startLimit = new Date('2026-04-01');
    let isEditing = false;

    // 時計の更新
    function updateClock() {
        try {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const el = document.getElementById('clock');
            if(el) el.innerHTML = `${h}:${m}<span>${s}</span>`;
        } catch(e) {}
    }
    setInterval(updateClock, 1000);
    updateClock();

    function getDateKey(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    // 画面の描画
    function render() {
        const dayNames = ['日','月','火','水','木','金','土'];
        document.getElementById('date-text').innerText = `${activeDate.getFullYear()}年${activeDate.getMonth()+1}月${activeDate.getDate()}日 (${dayNames[activeDate.getDay()]})`;
        
        const key = getDateKey(activeDate);
        document.getElementById('date-picker').value = key;
        
        const d_area = document.getElementById('e-deadline');
        const p_area_real = document.getElementById('e-plan'); 
        
        if (MASTER_DATA[key]) {
            d_area.innerHTML = MASTER_DATA[key].dead || '<ul><li>-</li></ul>';
            if(p_area_real) p_area_real.innerHTML = MASTER_DATA[key].plan || '<ul><li>-</li></ul>';
        } else {
            d_area.innerHTML = '<ul><li>（提出物を入力）</li></ul>';
            if(p_area_real) p_area_real.innerHTML = '<ul><li>（予定を入力）</li></ul>';
        }
    }

    function moveDate(n) {
        if(isEditing) return; // 編集中は移動させない
        const d = new Date(activeDate);
        d.setDate(activeDate.getDate() + n);
        if (d >= startLimit && d <= endLimit) {
            activeDate = d;
            render();
        }
    }

    // 編集モード切り替え
    function toggleEdit() {
        isEditing = !isEditing;
        const ui = document.getElementById('main-ui');
        const eb = document.getElementById('edit-btn');
        const sb = document.getElementById('save-btn');
        const d_area = document.getElementById('e-deadline');
        const p_area = document.getElementById('e-plan');

        if (isEditing) {
            ui.classList.add('editing');
            eb.innerHTML = '<i class="fa-solid fa-xmark"></i> キャンセル';
            eb.style.background = "#64748b";
            sb.style.display = 'flex';
            d_area.setAttribute('contenteditable', 'true');
            p_area.setAttribute('contenteditable', 'true');
        } else {
            finishEditing();
        }
    }

    // 編集終了の共通処理
    function finishEditing() {
        isEditing = false;
        const ui = document.getElementById('main-ui');
        const eb = document.getElementById('edit-btn');
        const sb = document.getElementById('save-btn');
        const d_area = document.getElementById('e-deadline');
        const p_area = document.getElementById('e-plan');

        ui.classList.remove('editing');
        eb.innerHTML = '<i class="fa-solid fa-pen"></i> 編集モード';
        eb.style.background = "#f59e0b";
        sb.style.display = 'none';
        d_area.setAttribute('contenteditable', 'false');
        p_area.setAttribute('contenteditable', 'false');
        render();
    }

    // 保存処理
    function saveToMemory() {
        const key = getDateKey(activeDate);
        const d_content = document.getElementById('e-deadline').innerHTML;
        const p_content = document.getElementById('e-plan').innerHTML;

        // メモリ更新
        MASTER_DATA[key] = { dead: d_content, plan: p_content };

        // ブラウザ保存
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(MASTER_DATA));
        } catch(e) { console.error("Save failed", e); }
        
        const sb = document.getElementById('save-btn');
        sb.innerHTML = '<i class="fa-solid fa-check-double"></i> 保存しました！';
        
        setTimeout(() => {
            sb.innerHTML = '<i class="fa-solid fa-check"></i> 完了して保存';
            finishEditing();
        }, 600);
    }

    // コピー機能
    function copyFromPrevious(type) {
        const prev = new Date(activeDate);
        prev.setDate(activeDate.getDate() - 1);
        const prevKey = getDateKey(prev);

        if (MASTER_DATA[prevKey] && MASTER_DATA[prevKey][type]) {
            const target = document.getElementById(type === 'dead' ? 'e-deadline' : 'e-plan');
            target.innerHTML = MASTER_DATA[prevKey][type];
        } else {
            alert("前日のデータがありません。");
        }
    }

    // ファイル書き出し
    function exportData() {
        const dataStr = JSON.stringify(MASTER_DATA, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `掲示板データ_${getDateKey(new Date())}.json`;
        a.click();
    }

    // ファイル読み込み (強化版)
    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (typeof imported === 'object' && imported !== null) {
                    MASTER_DATA = imported;
                    render();
                    alert("データを復元しました。");
                    // 読み込んだデータをブラウザにも覚えさせる
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(MASTER_DATA));
                } else {
                    throw new Error("Invalid Format");
                }
            } catch (err) {
                alert("エラー：ファイルが正しくないか、データが壊れています。以前保存した .json ファイルを選択してください。");
            }
        };
        reader.readAsText(file);
        event.target.value = ''; // 連続読み込み対応
    }

    document.getElementById('date-picker').addEventListener('change', (e) => {
        const d = new Date(e.target.value);
        if (!isNaN(d)) { activeDate = d; render(); }
    });

    window.onload = () => {
        // キャッシュ読み込み
        try {
            const cached = localStorage.getItem(STORAGE_KEY);
            if(cached) MASTER_DATA = JSON.parse(cached);
        } catch(e){}
        const today = new Date();
        activeDate = (today >= startLimit && today <= endLimit) ? today : startLimit;
        render();
    };
</script>
</body>
</html>
